<div
  class="bg-surface-50 dark:bg-surface-950 flex items-center justify-center min-h-screen overflow-hidden py-10"
>
  <div class="flex flex-col items-center justify-center">
    <div
      style="
        border-radius: 56px;
        padding: 0.3rem;
        background: linear-gradient(180deg, rgba(233, 30, 99, 0.4) 10%, rgba(33, 150, 243, 0) 30%);
      "
    >
      <div
        class="sm:w-full md:w-2xl lg:w-6xl bg-surface-0 dark:bg-surface-900 py-20 px-8 sm:px-20 flex flex-col items-center"
        style="border-radius: 53px"
      >
        <div class="gap-4 flex flex-col items-center">
          <div
            class="flex justify-center items-center border-2 border-pink-500 rounded-full"
            style="height: 3.2rem; width: 3.2rem"
          >
            <i class="pi pi-fw pi-exclamation-circle text-2xl! text-pink-500"></i>
          </div>
          <h1 class="text-surface-900 dark:text-surface-0 font-bold text-5xl mb-2">Server Error</h1>
          <span class="text-muted-color mb-8">{{
            error ? error.message : 'An unexpected error occurred.'
          }}</span>
          <div class="flex items-center justify-center">
            <img
              src="https://primefaces.org/cdn/templates/sakai/auth/asset-error.svg"
              alt="Error"
              class="mb-8"
              width="50%"
            />
          </div>
          <div class="col-span-12 mt-8 text-center flex gap-6">
            <p-button size="large" label="Show details" (click)="detailsToggle()"></p-button>
            <p-button
              size="large"
              label="Go to Dashboard"
              (click)="goToDashboard()"
              severity="danger"
            />
          </div>
          @if (showDetails) {
            <div
              class="w-full max-h-48 overflow-y-auto bg-surface-100 dark:bg-surface-800 rounded-lg p-4 text-sm text-left font-mono"
            >
              {{ error ? error.details : 'No additional details available.' }}
            </div>
          }
        </div>
      </div>
    </div>
  </div>
</div>

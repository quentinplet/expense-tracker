<aside
  class="h-[calc(100vh-4rem)] w-64 bg-white border-r rounded-sm border-gray-200 overflow-y-auto"
>
  <ul class="list-none p-4 m-0 flex flex-col gap-1">
    @for (item of menuItems; track item.route) {
      <li>
        <a
          [routerLink]="item.route"
          routerLinkActive="!bg-primary !text-white"
          class="flex items-center gap-3 px-4 py-3 rounded-lg text-gray-600 hover:bg-gray-100 transition-colors no-underline cursor-pointer"
        >
          <i [class]="item.icon + ' text-lg'"></i>
          <span class="font-medium">{{ item.label }}</span>
        </a>
      </li>
    }
  </ul>
</aside>
